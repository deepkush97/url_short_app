apiVersion: v1
kind: ConfigMap
metadata:
  name: url-shortener-config
  namespace: url-shortener-stack
data:
  APP_PORT: '4002'
  APP_LOG_LEVEL: info
  APP_ENV: production
  DB_HOST: mysql-service
  DB_PORT: '3306'
  DB_USER: user
  DB_NAME: url_short_app
  DB_LOGGING: 'true'
  JWT_EXPIRATION_TIME_IN_SECONDS: '3600'
  REDIS_HOST: redis-service
  REDIS_PORT: '6379'
